<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>vsegDA</title>
  <meta name="description" content="vsegDA — скоро." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0a0a0a;
      --fg: #ffffff;
      --fg-dim: #6b6760;
      --accent: #e8ff47;
      --accent-text: #111111;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--fg);
      font-family: 'Syne', system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      overflow: hidden;
    }

    main {
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 2rem;
    }

    .wordmark {
      display: inline-flex;
      align-items: center;
      font-weight: 800;
      font-size: clamp(1.5rem, 4vw, 2.5rem);
      line-height: 1;
      letter-spacing: -0.04em;
    }

    .wordmark .vseg {
      color: var(--fg);
    }

    .wordmark .da {
      background: var(--accent);
      color: var(--accent-text);
      padding: 0.12em 0.18em 0.18em;
      border-radius: 0.18em;
      margin-left: 0.04em;
    }

    footer {
      position: fixed;
      bottom: 1.75rem;
      left: 0;
      right: 0;
      text-align: center;
      font-family: system-ui, sans-serif;
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--fg-dim);
    }

    footer a {
      color: var(--fg-dim);
      text-decoration: none;
      transition: color 0.2s ease;
    }

    footer a:hover {
      color: var(--accent);
    }
  </style>
</head>
<body>
  <main>
    <h1 class="wordmark">
      <span class="vseg">vseg</span><span class="da">DA</span>
    </h1>
  </main>

  <footer>
    <a href="https://veneracode.com">Venera Code</a>
  </footer>
</body>
</html>
